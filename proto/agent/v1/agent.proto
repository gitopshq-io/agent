syntax = "proto3";

package agent.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

service AgentHub {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Connect(stream AgentEnvelope) returns (stream HubEnvelope);
}

message ClusterInfo {
  string name = 1;
  string display_name = 2;
  string provider = 3;
  string region = 4;
  string environment = 5;
  string agent_version = 6;
  string kubernetes_version = 7;
  repeated string capabilities = 8;
  google.protobuf.Struct metadata = 9;
}

message RegisterRequest {
  string registration_token = 1;
  ClusterInfo cluster = 2;
}

message RegisterResponse {
  string agent_token = 1;
  string cluster_id = 2;
  int32 status_interval_seconds = 3;
}

message Heartbeat {
  string cluster_id = 1;
  string agent_version = 2;
  repeated string capabilities = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message InventorySummary {
  string cluster_name = 1;
  int32 namespace_count = 2;
  int32 node_count = 3;
  int32 ready_node_count = 4;
  int32 pod_count = 5;
  int32 deployment_count = 6;
  string kubernetes_version = 7;
}

message ResourceRef {
  string kind = 1;
  string namespace = 2;
  string name = 3;
  string status = 4;
  map<string, string> labels = 5;
}

message InventorySnapshot {
  google.protobuf.Timestamp timestamp = 1;
  InventorySummary summary = 2;
  repeated ResourceRef resources = 3;
}

message ArgoSource {
  string repo_url = 1;
  string path = 2;
  string chart = 3;
  string target_revision = 4;
  string ref = 5;
  string type = 6;
}

message ArgoSyncPolicy {
  bool automated = 1;
  bool prune = 2;
  bool self_heal = 3;
  bool allow_empty = 4;
}

message ArgoOperationState {
  string phase = 1;
  string message = 2;
  google.protobuf.Timestamp started_at = 3;
  google.protobuf.Timestamp finished_at = 4;
}

message ArgoCondition {
  string type = 1;
  string message = 2;
  google.protobuf.Timestamp last_transition_at = 3;
}

message ArgoResource {
  string group = 1;
  string kind = 2;
  string namespace = 3;
  string name = 4;
  string version = 5;
  string sync_status = 6;
  string health_status = 7;
  string health_message = 8;
  string hook_type = 9;
  bool requires_pruning = 10;
}

message ArgoEvent {
  string type = 1;
  string reason = 2;
  string message = 3;
  string namespace = 4;
  string kind = 5;
  string name = 6;
  int32 count = 7;
  google.protobuf.Timestamp first_timestamp = 8;
  google.protobuf.Timestamp last_timestamp = 9;
}

message ArgoHistoryEntry {
  int64 id = 1;
  string revision = 2;
  google.protobuf.Timestamp deployed_at = 3;
  string source_type = 4;
}

message ArgoApplication {
  string name = 1;
  string namespace = 2;
  string project = 3;
  string repo_url = 4;
  string path = 5;
  string target_revision = 6;
  string sync_status = 7;
  string health_status = 8;
  int32 resource_count = 9;
  google.protobuf.Timestamp last_synced_at = 10;
  string destination_server = 11;
  string destination_namespace = 12;
  string source_type = 13;
  repeated ArgoSource sources = 14;
  string live_revision = 15;
  google.protobuf.Timestamp reconciled_at = 16;
  int32 out_of_sync_resource_count = 17;
  int32 degraded_resource_count = 18;
  ArgoSyncPolicy sync_policy = 19;
  ArgoOperationState operation = 20;
  repeated ArgoCondition conditions = 21;
  repeated ArgoResource resources = 22;
  repeated ArgoEvent events = 23;
  repeated ArgoHistoryEntry history = 24;
}

message ArgoApplicationStatus {
  google.protobuf.Timestamp timestamp = 1;
  repeated ArgoApplication applications = 2;
}

message DriftFinding {
  string id = 1;
  string severity = 2;
  string scope = 3;
  string kind = 4;
  string namespace = 5;
  string name = 6;
  string summary = 7;
  string desired_version = 8;
  string live_version = 9;
  google.protobuf.Timestamp detected_at = 10;
  google.protobuf.Value details = 11;
}

message DriftReport {
  google.protobuf.Timestamp timestamp = 1;
  repeated DriftFinding findings = 2;
}

message CommandAck {
  string command_id = 1;
  string status = 2;
  string message = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message CommandResult {
  string command_id = 1;
  string status = 2;
  string message = 3;
  string error = 4;
  google.protobuf.Value result = 5;
  google.protobuf.Timestamp timestamp = 6;
}

message CredentialRef {
  string namespace = 1;
  string secret_name = 2;
  string key = 3;
}

message SourceRef {
  string type = 1;
  string url = 2;
  string resolved_revision = 3;
  string resolved_digest = 4;
  string chart = 5;
  string path = 6;
  CredentialRef credential_ref = 7;
}

message ValuesRef {
  string digest = 1;
  google.protobuf.Struct inline_values = 2;
  CredentialRef credential_ref = 3;
}

message ArgoSyncCommand {
  string application = 1;
  string namespace = 2;
  string project = 3;
  bool prune = 4;
  bool dry_run = 5;
}

message ArgoRollbackCommand {
  string application = 1;
  string namespace = 2;
  int64 id = 3;
  bool prune = 4;
}

message DeployHelmReleaseCommand {
  string release_name = 1;
  string namespace = 2;
  SourceRef source = 3;
  ValuesRef values = 4;
}

message ApplyKustomizeCommand {
  string namespace = 1;
  SourceRef source = 2;
  ValuesRef values = 3;
}

message ApplyManifestBundleCommand {
  string namespace = 1;
  SourceRef source = 2;
}

message RestartWorkloadCommand {
  string namespace = 1;
  string kind = 2;
  string name = 3;
}

message ScaleWorkloadCommand {
  string namespace = 1;
  string kind = 2;
  string name = 3;
  int32 replicas = 4;
}

message RunDriftScanCommand {
  string scope = 1;
}

message InspectResourceCommand {
  string namespace = 1;
  string kind = 2;
  string name = 3;
  string container = 4;
  int32 tail_lines = 5;
  bool include_events = 6;
  bool include_logs = 7;
}

message ExecuteCommand {
  string command_id = 1;
  string required_capability = 2;
  google.protobuf.Timestamp expires_at = 3;
  string spec_hash = 4;
  string requested_by = 5;

  oneof payload {
    ArgoSyncCommand argo_sync = 10;
    ArgoRollbackCommand argo_rollback = 11;
    DeployHelmReleaseCommand deploy_helm_release = 12;
    ApplyKustomizeCommand apply_kustomize = 13;
    ApplyManifestBundleCommand apply_manifest_bundle = 14;
    RestartWorkloadCommand restart_workload = 15;
    ScaleWorkloadCommand scale_workload = 16;
    RunDriftScanCommand run_drift_scan = 17;
    InspectResourceCommand inspect_resource = 18;
  }
}

message CredentialBundle {
  string version = 1;
  string namespace = 2;
  string secret_name = 3;
  string type = 4;
  map<string, string> string_data = 5;
  map<string, string> labels = 6;
  map<string, string> annotations = 7;
  repeated string required_scopes = 8;
}

message SyncCredentials {
  string command_id = 1;
  string version = 2;
  repeated CredentialBundle bundles = 3;
}

message CredentialSyncResult {
  string version = 1;
  string status = 2;
  string message = 3;
  string namespace = 4;
  string secret_name = 5;
  google.protobuf.Timestamp timestamp = 6;
}

message ConfigUpdate {
  int32 status_interval_seconds = 1;
  repeated string capabilities = 2;
}

message RotateToken {
  string command_id = 1;
  string new_token = 2;
  google.protobuf.Timestamp timestamp = 3;
}

message Ping {
  google.protobuf.Timestamp timestamp = 1;
}

message AgentEnvelope {
  Heartbeat heartbeat = 1;
  InventorySnapshot inventory_snapshot = 2;
  ArgoApplicationStatus argo_application_status = 3;
  DriftReport drift_report = 4;
  CommandAck command_ack = 5;
  CommandResult command_result = 6;
  CredentialSyncResult credential_sync_result = 7;
}

message HubEnvelope {
  ExecuteCommand execute_command = 1;
  SyncCredentials sync_credentials = 2;
  RotateToken rotate_token = 3;
  ConfigUpdate config_update = 4;
  Ping ping = 5;
}

image:
  repository: ghcr.io/gitopshq-io/agent
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

podAnnotations: {}
podSecurityContext:
  fsGroup: 65532
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
resources: {}

agent:
  clusterName: default
  displayName: ""
  provider: ""
  region: ""
  environment: ""
  version: ""
  tokenPath: /var/lib/gitopshq/identity/agent.json

hub:
  address: gitopshq.example.internal:50051
  statusIntervalSeconds: 30

registrationToken: ""

rbac:
  create: true
  profile: readonly

capabilities:
  observe: true
  argocdRead: true
  argocdWrite: false
  directDeploy: false
  kubernetesRestart: false
  kubernetesScale: false
  credentialSync: false
  tokenRotate: true

credentialSync:
  mode: mirrored
  targets: []

argocd:
  server: ""
  token: ""
  insecure: false

directDeploy:
  kubeconfigPath: ""
  defaultNamespace: ""
  fieldManager: gitopshq-agent
  forceOwnership: false
  workDir: /var/lib/gitopshq/work

tls:
  insecure: false
  serverName: ""
  caCertPath: ""

proxy:
  httpProxy: ""
  httpsProxy: ""
  noProxy: ""

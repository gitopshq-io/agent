{{- if and .Values.rbac.create .Values.persistence.enabled (eq .Values.persistence.type "secret") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "gitopshq-agent.fullname" . }}-identity
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "gitopshq-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ include "gitopshq-agent.identitySecretName" . | quote }}]
    verbs: ["get", "update", "patch"]
{{- end }}

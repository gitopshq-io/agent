{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "gitopshq-agent.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "gitopshq-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    gitopshq.io/rbac-profile: {{ .Values.rbac.profile | quote }}
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
{{- if .Values.capabilities.diagnosticsRead }}
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
{{- end }}
{{- if or .Values.capabilities.directDeploy .Values.capabilities.kubernetesRestart .Values.capabilities.kubernetesScale }}
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- else if .Values.capabilities.credentialSync }}
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- end }}
{{- end }}

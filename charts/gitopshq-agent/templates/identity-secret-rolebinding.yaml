{{- if and .Values.rbac.create .Values.persistence.enabled (eq .Values.persistence.type "secret") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "gitopshq-agent.fullname" . }}-identity
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "gitopshq-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "gitopshq-agent.fullname" . }}-identity
subjects:
  - kind: ServiceAccount
    name: {{ include "gitopshq-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}

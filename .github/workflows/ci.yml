name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOVULNCHECK_VERSION: v1.1.4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64

      - name: Run tests
        run: go test -race ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          $(go env GOPATH)/bin/govulncheck ./...

      - name: Render Helm chart
        run: helm template gitopshq-agent ./charts/gitopshq-agent >/tmp/gitopshq-agent-chart.yaml

      - name: Lint proto
        run: buf lint

      - name: Check proto compatibility
        if: github.event_name == 'pull_request'
        run: buf breaking --against '.git#branch=main'

      - name: Build container smoke test
        run: docker build -t gitopshq-agent:test .

  container-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t gitopshq-agent:test .

      - name: Scan image for HIGH/CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: gitopshq-agent:test
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: HIGH,CRITICAL
